목적: "영화 찾기"
주제: "행복이란 무엇인가"
# 이미 다른 사람들이 선택한 영화. 이 영화들은 선택할 수 없음.
"선정 불가능한 영화":
  - "그린북"
  - "퍼펙트 데이즈"
  - "소울"
  - "코코"
  - "리틀 포레스트"
  - "인사이드 아웃 2"
# "영화 이름": "그 영화를 선택한 이유" 형태로 적어주기
"영화 목록":
  - "어바웃 타임": "평범한 일상의 소중함과 매 순간을 온전히 즐기는 것이 진정한 행복임을 깨닫게 해줌"
  - "꾸뻬씨의 행복여행": "행복을 찾기 위해 떠난 여정을 통해, 행복은 목적지가 아니라 살아가는 과정 그 자체임을 보여줌"
  - "월터의 상상은 현실이 된다": "상상에만 머물던 주인공이 현실의 모험을 통해 자아를 찾고 살아있음의 행복을 느끼는 과정을 그림"
  - "포레스트 검프": "순수한 마음과 꾸준함으로 자신만의 행복한 삶을 개척해 나가는 주인공의 감동적인 서사"
  - "행복을 찾아서": "절망적인 상황에서도 희망을 잃지 않고 끊임없이 노력하여 마침내 스스로 행복을 성취해내는 실화 바탕의 영화"
  - "인생은 아름다워": "참혹한 수용소 생활 속에서도 아들을 위해 희망과 웃음을 잃지 않는 아버지의 사랑과 역설적인 행복"
  - "아멜리에": "주변 사람들에게 소소한 기쁨을 찾아주며 자신도 진정한 사랑과 일상 속 마법 같은 행복을 발견하게 됨"
  - "굿 윌 헌팅": "상처받은 천재가 진정한 멘토를 만나 마음의 문을 열고 자신을 있는 그대로 사랑하며 행복을 찾아감"
  - "쇼생크 탈출": "어떤 억압 속에서도 자유와 희망에 대한 끈을 놓지 않고 쟁취해 내는 진정한 행복과 해방감을 선사함"
  - "카모메 식당": "낯선 곳에서 식당을 열고 정성스러운 음식으로 사람들과 소통하며 느끼는 일상 속 잔잔하고 소박한 행복"
  - "업": "사랑하는 아내와의 추억을 넘어, 새로운 인연을 맺고 지금 현재를 충실히 살아가는 것이 또 다른 행복임을 보여줌"
  - "빅 피쉬": "현실과 환상을 넘나드는 이야기를 통해 가족 간의 이해와 화해를 이루고, 삶을 긍정하는 아름다운 행복을 그림"
  - "패터슨": "매일 똑같이 반복되는 일상 속에서 시적인 찰나를 발견하며 느끼는 평범하고 고요한 삶의 아름다움"
  - "맘마미아!": "아름다운 섬을 배경으로 음악과 춤, 가족과 친구들의 사랑을 통해 순수한 기쁨과 행복한 에너지를 가득 전달함"
  - "인턴": "서로 다른 세대가 만나 지혜와 열정을 나누며 우정을 쌓고, 함께 성장하며 일과 삶의 균형을 찾아가는 행복"
  - "원더": "남들과 다른 외모를 가진 소년이 주변의 따뜻한 사랑 속에서 편견을 극복하고 자신만의 기적과 행복을 만들어감"
  - "버킷리스트: 죽기 전에 꼭 하고 싶은 것들": "시한부 두 노인이 후회 없는 마지막을 위해 떠난 여정에서 피어나는 우정과 생의 온전한 기쁨"
  - "비긴 어게인": "상처받은 영혼들이 음악을 통해 교감하고 치유받으며, 다시 시작할 수 있는 용기와 작은 행복을 찾아감"
  - "트루먼 쇼": "주어진 가짜 행복을 거부하고, 예측 불가능하더라도 스스로 선택하고 개척하는 진짜 삶과 자유의 가치를 역설함"
  - "미스 리틀 선샤인": "완벽하지 않은 가족이 우당탕탕 여행을 통해 서로를 이해하고 보듬으며 진정한 가족의 의미와 소소한 행복을 깨달음"